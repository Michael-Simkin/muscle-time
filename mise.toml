[tasks.bootstrap]
description = "Install tools, generate project, install hooks"
run = "scripts/bootstrap.sh"

[tasks.generate]
description = "Regenerate Xcode project"
run = "xcodegen generate"

[tasks.format]
description = "Format Swift sources"
run = "scripts/format.sh"

[tasks.lint]
description = "Run fast linters and policy checks"
run = "scripts/lint.sh"

[tasks.analyze]
description = "Run Xcode static analyzer"
run = "scripts/analyze.sh"

[tasks.verify]
description = "Run full local verification"
run = "scripts/verify.sh"

[tasks.build]
description = "Build app"
run = "scripts/build.sh"
