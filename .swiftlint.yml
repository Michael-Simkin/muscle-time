strict: true

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - Build
  - Generated

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 18

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - z

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - force_unwrapping
  - last_where
  - legacy_random
  - modifier_order
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - todo
  - trailing_comma

custom_rules:
  no_direct_userdefaults:
    included: ".*\\.swift"
    regex: "UserDefaults\\.standard"
    message: "Use SettingsStore. Direct UserDefaults breaks tests and agent refactors."
    severity: warning

  no_global_event_monitor_without_doc:
    included: ".*\\.swift"
    regex: "NSEvent\\.addGlobalMonitorForEvents"
    message: "Global input monitoring needs TCC rationale and ADR."
    severity: error

  no_single_screen_overlay:
    included: ".*\\.swift"
    regex: "NSScreen\\.main"
    message: "Overlay must handle all NSScreen.screens, not just main screen."
    severity: warning

  no_forced_accessibility_prompt:
    included: ".*\\.swift"
    regex: "AXIsProcessTrustedWithOptions"
    message: "Accessibility prompts need explicit product decision and ADR."
    severity: error

  no_network_client_without_update_adr:
    included: ".*\\.swift"
    regex: "URLSession\\.shared"
    message: "Network use needs ADR. App should be local-only unless updates/sync exist."
    severity: warning
