strict: true

analyzer_rules:
  - unused_import

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - Build
  - Generated

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 18

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - z

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - force_cast
  - force_try
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - legacy_random
  - modifier_order
  - non_overridable_class_declaration
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - private_over_fileprivate
  - private_subject
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - static_over_final_class
  - strict_fileprivate
  - test_case_accessibility
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - weak_delegate
  - yoda_condition

disabled_rules:
  - todo
  - trailing_comma

custom_rules:
  no_direct_userdefaults:
    included: ".*\\.swift"
    regex: "UserDefaults\\.standard"
    message: "Use SettingsStore. Direct UserDefaults breaks tests and agent refactors."
    severity: warning

  no_global_event_monitor_without_doc:
    included: ".*\\.swift"
    regex: "NSEvent\\.addGlobalMonitorForEvents"
    message: "Global input monitoring needs TCC rationale and ADR."
    severity: error

  no_single_screen_overlay:
    included: ".*\\.swift"
    regex: "NSScreen\\.main"
    message: "Overlay must handle all NSScreen.screens, not just main screen."
    severity: warning

  no_forced_accessibility_prompt:
    included: ".*\\.swift"
    regex: "AXIsProcessTrustedWithOptions"
    message: "Accessibility prompts need explicit product decision and ADR."
    severity: error

  no_network_client_without_update_adr:
    included: ".*\\.swift"
    regex: "URLSession\\.shared"
    message: "Network use needs ADR. App should be local-only unless updates/sync exist."
    severity: warning

  no_ui_frameworks_in_core:
    included: "Sources/Core/.*\\.swift"
    regex: "^import\\s+(AppKit|SwiftUI|UserNotifications|ServiceManagement)\\b"
    message: "Core must stay UI- and permission-free. Move platform code to App or Overlay."
    severity: error

  no_dispatchqueue_main:
    included: ".*\\.swift"
    regex: "DispatchQueue\\.main\\.async"
    message: "Use MainActor isolation instead of manually hopping to DispatchQueue.main."
    severity: warning

  no_detached_tasks:
    included: ".*\\.swift"
    regex: "Task\\.detached"
    message: "Detached tasks need explicit ownership/cancellation design."
    severity: error

  no_runtime_api_escape_hatches:
    included: ".*\\.swift"
    regex: "(NSClassFromString|objc_getClass|dlopen\\(|dlsym\\(|Selector\\(\\s*\")"
    message: "Runtime/private API escape hatches need an ADR and review."
    severity: error

  no_print_debugging:
    included: ".*\\.swift"
    regex: "\\bprint\\s*\\("
    message: "Use Logger from OSLog for diagnostics instead of print."
    severity: warning
